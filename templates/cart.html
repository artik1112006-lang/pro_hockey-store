<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Корзина — Pro Hockey Store</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <div class="logo"><h1>HOCKEY SHOP</h1></div>
    <nav>
        <a href="/">← Вернуться в каталог</a>
    </nav>
</header>

<div class="form-container">
    <h2>Ваша корзина</h2>
    <div id="cart-list">
        <!-- Сюда JS вставит товары -->
    </div>

    <hr>
    <h3 id="total-price" style="text-align: right; margin-top: 20px;">Итого: 0 BYN</h3>

    <div id="order-form-section" style="display: none; margin-top: 30px;">
        <h3>Данные для доставки</h3>
        <form id="checkout-form">
            <input type="text" id="name" placeholder="Ваше имя" required>
            <input type="tel" id="phone" placeholder="Номер телефона (+375...)" required>
            <textarea id="address" placeholder="Адрес доставки" rows="3" required></textarea>
            <button type="submit" class="btn">Подтвердить заказ</button>
        </form>
    </div>

    <div id="empty-cart-msg" style="text-align: center; padding: 20px;">
        <p>В корзине пока пусто :(</p>
        <a href="/" class="btn btn-secondary">Перейти к покупкам</a>
    </div>
</div>

<script>
    const cartList = document.getElementById('cart-list');
    const totalElement = document.getElementById('total-price');
    const formSection = document.getElementById('order-form-section');
    const emptyMsg = document.getElementById('empty-cart-msg');

    function renderCart() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');

        if (cart.length === 0) {
            formSection.style.display = 'none';
            emptyMsg.style.display = 'block';
            cartList.innerHTML = '';
            totalElement.innerText = 'Итого: 0 BYN';
            return;
        }

        emptyMsg.style.display = 'none';
        formSection.style.display = 'block';

        let html = '';
        let total = 0;

        cart.forEach((item, index) => {
            html += `
                <div class="cart-item" style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee;">
                    <span>${item.name}</span>
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <strong>${item.price} BYN</strong>
                        <button onclick="removeItem(${index})" style="color:red; border:none; background:none; cursor:pointer; font-size: 1.2rem;">✖</button>
                    </div>
                </div>`;
            total += parseFloat(item.price);
        });

        cartList.innerHTML = html;
        totalElement.innerText = `Итого: ${total.toFixed(2)} BYN`;
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        cart.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(cart));
        renderCart();
    }

    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const itemsList = cart.map(i => `${i.name} (${i.price} BYN)`).join('\n');
        const total = totalElement.innerText;
        const address = document.getElementById('address').value;

        const formData = new FormData();
        formData.append('name', document.getElementById('name').value);
        formData.append('phone', document.getElementById('phone').value);
        formData.append('items', `Товары:\n${itemsList}\n\nАдрес: ${address}\n\n${total}`);

        try {
            const response = await fetch('/order', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                alert('✅ Ваш заказ принят!');
                localStorage.clear();
                window.location.href = '/';
            } else {
                alert('Ошибка сервера при отправке заказа.');
            }
        } catch (error) {
            alert('Связь с сервером потеряна.');
        }
    });

    renderCart();
</script>

</body>
</html>
