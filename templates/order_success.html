<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказ оформлен — Pro Hockey Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Montserrat', sans-serif; }

        body {
            /* ТЕМНО-СЕРЫЙ ФОН */
            background: linear-gradient(135deg, #1a1c1e 0%, #2c2f33 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .success-card {
            background: rgba(255, 255, 255, 0.98);
            padding: 50px 40px;
            border-radius: 24px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 500px;
            text-align: center;
            backdrop-filter: blur(5px);
            animation: cardAppear 0.6s ease-out;
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .success-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 30px auto;
            display: block;
        }

        .success-icon__circle {
            stroke-dasharray: 166;
            stroke-dashoffset: 166;
            stroke-width: 2;
            stroke-miterlimit: 10;
            stroke: #28a745;
            fill: none;
            animation: stroke 0.6s cubic-bezier(0.65, 0, 0.45, 1) forwards;
        }

        .success-icon__check {
            transform-origin: 50% 50%;
            stroke-dasharray: 48;
            stroke-dashoffset: 48;
            animation: stroke 0.3s cubic-bezier(0.65, 0, 0.45, 1) 0.8s forwards;
        }

        @keyframes stroke {
            100% { stroke-dashoffset: 0; }
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 15px;
            background: linear-gradient(90deg, #1a1a1a, #e63946);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-text {
            color: #555;
            font-size: 1.15rem;
            line-height: 1.6;
            margin-bottom: 35px;
        }

        .tg-contact-block {
            background: #fdfdfd;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #eaeaea;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.02);
            margin-bottom: 30px;
        }

        .tg-question {
            font-size: 1rem;
            color: #666;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .tg-link-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: linear-gradient(135deg, #0088cc 0%, #00aaff 100%);
            color: white;
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,136,204,0.3);
        }

        .tg-link-btn:hover {
            box-shadow: 0 6px 20px rgba(0,136,204,0.5);
            transform: translateY(-3px);
        }

        .tg-btn-icon {
            width: 22px;
            height: 22px;
        }

        .tg-username-hint {
            font-size: 0.85rem;
            margin-top: 12px;
            color: #bbb;
            font-weight: 400;
        }

        .back-home-link {
            display: inline-block;
            color: #999;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            transition: 0.2s;
            border-bottom: 1px solid transparent;
        }

        .back-home-link:hover {
            color: #e63946;
            border-bottom: 1px solid #e63946;
        }
    </style>
</head>
<body>

<div class="success-card">
    <svg class="success-icon" viewBox="0 0 52 52">
        <circle class="success-icon__circle" cx="26" cy="26" r="25" fill="none"/>
        <path class="success-icon__check" fill="none" d="M14.1 27.2l7.1 7.2 16.7-16.8"/>
    </svg>

    <h1>Заказ принят!</h1>
    <p class="main-text">Спасибо, что выбрали Pro Hockey Store. Мы уже начали обработку вашего заказа и свяжемся с вами в ближайшее время!</p>

    <div class="tg-contact-block">
        <p class="tg-question">Возникли вопросы? Напишите нам напрямую:</p>

        <a href="https://t.me/bl4z3rbtw" target="_blank" class="tg-link-btn">
            <svg class="tg-btn-icon" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69.01-.03.01-.14-.07-.2-.08-.06-.19-.04-.27-.02-.11.02-1.93 1.23-5.46 3.62-.51.35-.98.52-1.4.51-.46-.01-1.35-.26-2.01-.48-.81-.27-1.46-.42-1.4-.88.03-.24.38-.49 1.04-.74 4.06-1.77 6.77-2.93 8.12-3.47 3.86-1.53 4.66-1.8 5.19-1.81.11 0 .37.03.53.16.14.11.18.26.2.36.02.1.04.28.02.4z"/>
            </svg>
            Написать в Telegram
        </a>

        <p class="tg-username-hint">наш аккаунт: @bl4z3rbtw</p>
    </div>

    <a href="/" class="back-home-link">← Вернуться на главную</a>
</div>

</body>
</html>
