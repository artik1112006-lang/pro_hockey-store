<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Hockey Store — Хоккейная экипировка</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <div class="logo">
        <h1>PRO HOCKEY STORE</h1>
    </div>
    <nav>
        <a href="/">Каталог</a>
        <a href="/cart" id="cart-link">🛒 Корзина (<span id="cart-count">0</span>)</a>
    </nav>
</header>

<div class="container">
    {% for product in products %}
    <div class="card">
        <img src="{{ product.image_url }}" alt="{{ product.name }}">
        <div class="card-content">
            <h3>{{ product.name }}</h3>
            <p class="price">{{ product.price }} BYN</p>
            <button class="btn" onclick="addToCart('{{ product.id }}', '{{ product.name }}', {{ product.price }})">
                В корзину
            </button>
        </div>
    </div>
    {% else %}
    <div style="grid-column: 1/-1; text-align: center; padding: 50px;">
        <h2>Товаров пока нет. Зайдите в админку и добавьте их!</h2>
    </div>
    {% endfor %}
</div>

<script>
    function updateCartCount() {
        const cart = JSON.parse(localStorage.getItem('cart') || '[]');
        document.getElementById('cart-count').innerText = cart.length;
    }

    function addToCart(id, name, price) {
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        cart.push({ id, name, price });
        localStorage.setItem('cart', JSON.stringify(cart));
        updateCartCount();
        alert('Товар добавлен в корзину!');
    }

    updateCartCount();
</script>

</body>
</html>
